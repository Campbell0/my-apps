<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆翻牌</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --fg: #f0f0f5;
      --muted: #6b6b80;
      --accent: #ff3366;
      --success: #00ff88;
      --card-bg: #1a1a25;
      --border: #2a2a3a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--fg), var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle { color: var(--muted); margin-bottom: 20px; font-size: 0.9rem; }
    .stats {
      display: flex; gap: 30px;
      background: var(--bg2);
      padding: 15px 30px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; color: var(--accent); }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 400px;
      perspective: 1000px;
    }
    .card {
      width: 80px; height: 80px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card.matched { pointer-events: none; }
    .card.matched .front { border-color: var(--success); box-shadow: 0 0 20px rgba(0,255,136,0.4); }
    .face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 2px solid var(--border);
    }
    .back {
      background: linear-gradient(145deg, var(--card-bg), #0f0f18);
    }
    .back::before { content: '?'; font-size: 1.5rem; color: var(--muted); opacity: 0.5; }
    .front {
      background: linear-gradient(145deg, #1e1e2a, #14141c);
      transform: rotateY(180deg);
    }
    .card:hover:not(.flipped):not(.matched) .back {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(255,51,102,0.3);
    }
    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .btn:hover { opacity: 0.9; }
    .win {
      position: fixed; inset: 0;
      background: rgba(10,10,15,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .win.show { display: flex; }
    .win h2 { font-size: 3rem; color: var(--success); margin-bottom: 10px; }
    .win p { color: var(--muted); margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>记忆翻牌</h1>
  <div class="subtitle">找出所有配对的卡片</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="moves">0</div>
      <div class="stat-label">步数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="pairs">0/8</div>
      <div class="stat-label">配对</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer">0:00</div>
      <div class="stat-label">时间</div>
    </div>
  </div>
  <div class="board" id="board"></div>
  <button class="btn" onclick="initGame()">重新开始</button>
  <div class="win" id="win">
    <h2>🎉 恭喜!</h2>
    <p id="winText">你用了 0 步，耗时 0:00</p>
    <button class="btn" onclick="initGame()">再玩一次</button>
  </div>
  <script>
    const emojis = ['🎮', '🎲', '🎯', '🎪', '🎨', '🎭', '🎪', '🎵', '🎹', '🎸', '🎺', '🎻'];
    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let timer = null;
    let seconds = 0;
    let locked = false;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initGame() {
      const board = document.getElementById('board');
      const win = document.getElementById('win');
      win.classList.remove('show');
      board.innerHTML = '';
      cards = [];
      flipped = [];
      matched = 0;
      moves = 0;
      seconds = 0;
      locked = false;
      if (timer) clearInterval(timer);
      timer = null;
      updateStats();

      const selected = shuffle(emojis).slice(0, 8);
      const pairs = shuffle([...selected, ...selected]);

      pairs.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = i;
        card.innerHTML = `<div class="face back"></div><div class="face front">${emoji}</div>`;
        card.onclick = () => flipCard(card);
        board.appendChild(card);
        cards.push(card);
      });
    }

    function flipCard(card) {
      if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      
      if (!timer) {
        timer = setInterval(() => {
          seconds++;
          updateStats();
        }, 1000);
      }

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        moves++;
        updateStats();
        locked = true;

        const [a, b] = flipped;
        if (a.dataset.emoji === b.dataset.emoji) {
          a.classList.add('matched');
          b.classList.add('matched');
          matched++;
          updateStats();
          flipped = [];
          locked = false;

          if (matched === 8) {
            clearInterval(timer);
            setTimeout(() => {
              document.getElementById('winText').textContent = 
                `你用了 ${moves} 步，耗时 ${formatTime(seconds)}`;
              document.getElementById('win').classList.add('show');
            }, 500);
          }
        } else {
          setTimeout(() => {
            a.classList.remove('flipped');
            b.classList.remove('flipped');
            flipped = [];
            locked = false;
          }, 800);
        }
      }
    }

    function updateStats() {
      document.getElementById('moves').textContent = moves;
      document.getElementById('pairs').textContent = `${matched}/8`;
      document.getElementById('timer').textContent = formatTime(seconds);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    initGame();
  </script>
</body>
</html>
